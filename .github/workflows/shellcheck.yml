name: ShellCheck

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: ShellCheck kur
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Bash scriptlerini denetle
        run: shellcheck setup.sh scripts/*.sh

